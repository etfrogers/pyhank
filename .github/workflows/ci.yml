name: Python package

on:
  push:
    branches:
      - 'main'
      - 'release'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        python-version: ["3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        pip install .[dev]
    - name: Build and install
      run: |
        python -m build
        pip install --upgrade ./dist/*.whl
    - name: Check NumPy Config
      run:  |
        python -c "import numpy as np; np.show_config()"
        python -c "import sys; print('GIL Enabled:', sys._is_gil_enabled())"
    - name: Test with pytest
      env:
          OPENBLAS_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OMP_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
      run: |
        pip install pytest-timeout
        pytest --cov=./ --flake8 --durations=10 --timeout=800
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  test-legacy:
    runs-on: ubuntu-latest
    name: "Oldest Dependencies on Python 3.10"
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        pip install -r requirements-legacy.txt
        pip install . --no-deps
    - name: Test and build
      run: |
        python -m build
        pytest --flake8

  build-docs:
    runs-on: ubuntu-latest
    name: "Build Documentation"
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[docs]
    - name: Build docs
      run: |
        sphinx-build ./docs/ ./docs/build/
    - name: Upload docs artifacts
      uses: actions/upload-artifact@v4
      with:
        name: docs-build
        path: docs/build/

  deploy:
    runs-on: ubuntu-latest
    needs: [test, test-legacy, build-docs]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    name: "Deploy to PyPI"
    permissions: # IMPORTANT: this permission is mandatory for Trusted Publishing
        id-token: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: python -m build
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
